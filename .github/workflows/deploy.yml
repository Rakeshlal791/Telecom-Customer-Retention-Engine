name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] # Or 'master' depending on your default branch name

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import HfApi; HfApi().upload_folder(folder_path='.', repo_id='stargazer791/Customer-Retention-Engine', repo_type='space', token='${{ secrets.HF_TOKEN }}')"